<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>萌娃闯关 - 成语·古诗·英语</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <div class="container">

    <!-- ========== 首页 ========== -->
    <div id="home-screen" class="screen active">
      <div class="top-bar">
        <div class="coin">🪙 <span id="home-coins">0</span></div>
        <button class="sound-toggle" id="sound-toggle" onclick="App.toggleSound()">🔊</button>
        <div class="hint-badge">💡 <span id="home-hints">0</span></div>
      </div>

      <div class="home-title bounce-in">
        <h1>🎮 萌娃闯关</h1>
        <p>成语 · 古诗 · 英语</p>
      </div>

      <div class="subject-card fade-in" style="animation-delay: 0.1s" onclick="App.goToLevels('idiom')">
        <div class="subject-icon idiom">📚</div>
        <div class="subject-info">
          <h3>成语乐园</h3>
          <p>闯关学成语，妙语连珠</p>
          <div class="subject-progress">
            <span class="stars-tiny" id="idiom-stars">☆☆☆</span>
            <span id="idiom-level">第1关</span>
          </div>
        </div>
        <div>›</div>
      </div>

      <div class="subject-card fade-in" style="animation-delay: 0.2s" onclick="App.goToLevels('poem')">
        <div class="subject-icon poem">🎋</div>
        <div class="subject-info">
          <h3>古诗天地</h3>
          <p>诵读经典诗，传承文化</p>
          <div class="subject-progress">
            <span class="stars-tiny" id="poem-stars">☆☆☆</span>
            <span id="poem-level">第1关</span>
          </div>
        </div>
        <div>›</div>
      </div>

      <div class="subject-card fade-in" style="animation-delay: 0.3s" onclick="App.goToLevels('english')">
        <div class="subject-icon english">🔤</div>
        <div class="subject-info">
          <h3>英语世界</h3>
          <p>快乐记单词，世界更精彩</p>
          <div class="subject-progress">
            <span class="stars-tiny" id="english-stars">☆☆☆</span>
            <span id="english-level">第1关</span>
          </div>
        </div>
        <div>›</div>
      </div>

      <div class="subject-card fade-in" style="animation-delay: 0.4s" onclick="App.showWrongBook()">
        <div class="subject-icon" style="background:#FCE4EC">📖</div>
        <div class="subject-info">
          <h3>错题本</h3>
          <p>温故知新，查漏补缺</p>
        </div>
        <div>›</div>
      </div>

      <div class="home-footer fade-in" style="animation-delay: 0.5s">
        <p>🎉 每天进步一点点 🎉</p>
      </div>
    </div>

    <!-- ========== 关卡选择 ========== -->
    <div id="levels-screen" class="screen">
      <div class="top-bar">
        <button class="btn-back" onclick="App.showScreen('home-screen')">‹</button>
        <h3 id="levels-title">选择关卡</h3>
        <div></div>
      </div>
      <div id="levels-grid" class="level-grid"></div>
    </div>

    <!-- ========== 答题界面 ========== -->
    <div id="quiz-screen" class="screen">
      <div class="quiz-header">
        <button class="btn-back" onclick="App.confirmQuit()">‹</button>
        <div class="level-info" id="quiz-level-info">第1关</div>
        <div class="hearts" id="hearts">❤️❤️❤️</div>
      </div>
      <div class="progress-bar">
        <div class="fill" id="quiz-progress" style="width:0%"></div>
      </div>

      <div class="question-card fade-in" id="question-card">
        <div class="question-text" id="question-text"></div>
        <button class="speaker-btn" id="speaker-btn" style="display:none" onclick="App.speakQuestion()">🔊</button>
      </div>

      <div class="options" id="options-container"></div>


      <button class="hint-btn" id="hint-btn" onclick="App.useHint()">
        💡 使用提示卡（剩余：<span id="quiz-hints">0</span>）
      </button>

    </div>

    <!-- ========== 错题本 ========== -->
    <div id="wrongbook-screen" class="screen">
      <div class="top-bar">
        <button class="btn-back" onclick="App.showScreen('home-screen')">‹</button>
        <h3>错题本</h3>
        <div></div>
      </div>
      <div id="wrongbook-content"></div>
    </div>
    <!-- ========== 结果弹窗 ========== -->
    <div class="modal-overlay" id="result-modal">
      <div class="modal">
        <h2 id="result-title">🎉 恭喜过关！</h2>
        <div class="stars-big" id="result-stars">⭐⭐⭐</div>
        <p id="result-msg">太棒了！继续加油！</p>
        <div>
          <button class="modal-btn" onclick="App.nextLevel()">下一关</button>
          <button class="modal-btn secondary" onclick="App.retryLevel()">再试一次</button>
        </div>
      </div>
    </div>

    <!-- ========== 每日奖励 ========== -->
    <div class="reward-popup" id="reward-popup">
      <div class="coin-icon">🪙</div>
      <h3>每日登录奖励！</h3>
      <p id="reward-text">获得 15 金币</p>
      <button class="modal-btn" onclick="App.closeReward()">太好了！</button>
    </div>

    <!-- 音效通过 Web Audio API 生成，无需外部文件 -->

  </div>

  <script src="js/pinyin-dict.js?v=1"></script>
  <script src="js/storage.js?v=11"></script>
  <script src="js/data-manager.js?v=11"></script>
  <script src="js/app.js?v=12"></script>
</body>
</html>
