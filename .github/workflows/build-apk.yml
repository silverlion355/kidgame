name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Download Gradle 7.5
        run: |
          curl -L -o /tmp/gradle-7.5-bin.zip "https://services.gradle.org/distributions/gradle-7.5-bin.zip"
          unzip -o /tmp/gradle-7.5-bin.zip -d /tmp/
          /tmp/gradle-7.5/bin/gradle --version

      - name: Build Debug APK
        run: /tmp/gradle-7.5/bin/gradle assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: kidgame-debug-apk
          path: app/build/outputs/apk/debug/*.apk

      - name: Send APK via Lark
        run: |
          node -e "
          const fs = require('fs');
          const https = require('https');
          const path = require('path');

          const APK_PATH = 'app/build/outputs/apk/debug/app-debug.apk';
          const TOKEN_URL = 'https://open.feishu.cn/open-apis/auth/v3/tenant_access_token/internal';
          const UPLOAD_URL = 'https://open.feishu.cn/open-apis/im/v1/files';
          const MSG_URL = 'https://open.feishu.cn/open-apis/im/v1/messages?receive_id_type=open_id';
          const USER_ID = 'ou_e29bb5900c6bb809e8987e64be1b673b';
          const APP_ID = 'cli_a97ae0dd73b81bd4';
          const APP_SECRET = 'mV5QTa5hK8Ph43DLHT0LmeBZH5KTolWn';

          function postJson(url, body, token) {
            return new Promise((resolve, reject) => {
              const urlObj = new URL(url);
              const bodyStr = JSON.stringify(body);
              const options = {
                hostname: urlObj.hostname,
                path: urlObj.pathname + urlObj.search,
                method: 'POST',
                headers: {
                  'Content-Type': 'application/json',
                  'Authorization': 'Bearer ' + token,
                  'Content-Length': Buffer.byteLength(bodyStr)
                }
              };
              const req = https.request(options, (res) => {
                let data = '';
                res.on('data', chunk => data += chunk);
                res.on('end', () => { try { resolve(JSON.parse(data)); } catch { resolve(data); } });
              });
              req.on('error', reject);
              req.write(bodyStr);
              req.end();
            });
          }

          async function uploadFile(token, filePath) {
            const fileName = path.basename(filePath);
            const fileContent = fs.readFileSync(filePath);
            const boundary = '----LarkUpload' + Date.now();
            const parts = [];
            parts.push(Buffer.from('--' + boundary + '\\r\\nContent-Disposition: form-data; name=\"file_name\"\\r\\n\\r\\n' + fileName + '\\r\\n'));
            parts.push(Buffer.from('--' + boundary + '\\r\\nContent-Disposition: form-data; name=\"file_type\"\\r\\n\\r\\nstream\\r\\n'));
            const fileHeader = Buffer.from('--' + boundary + '\\r\\nContent-Disposition: form-data; name=\"file\"; filename=\"' + fileName + '\"\\r\\nContent-Type: application/octet-stream\\r\\n\\r\\n');
            const fileFooter = Buffer.from('\\r\\n--' + boundary + '--');
            const totalBody = Buffer.concat([...parts, fileHeader, fileContent, fileFooter]);
            return new Promise((resolve, reject) => {
              const urlObj = new URL(UPLOAD_URL);
              const options = {
                hostname: urlObj.hostname,
                path: urlObj.pathname,
                method: 'POST',
                headers: {
                  'Authorization': 'Bearer ' + token,
                  'Content-Type': 'multipart/form-data; boundary=' + boundary,
                  'Content-Length': totalBody.length
                }
              };
              const req = https.request(options, (res) => {
                let data = '';
                res.on('data', chunk => data += chunk);
                res.on('end', () => { try { resolve(JSON.parse(data)); } catch { resolve(data); } });
              });
              req.on('error', reject);
              req.write(totalBody);
              req.end();
            });
          }

          async function main() {
            const tokenRes = await postJson(TOKEN_URL, { app_id: APP_ID, app_secret: APP_SECRET });
            const token = tokenRes.tenant_access_token;
            console.log('Token:', token ? 'OK' : 'FAIL');
            const uploadRes = await uploadFile(token, APK_PATH);
            console.log('Upload:', JSON.stringify(uploadRes));
            if (uploadRes.code === 0) {
              const msgRes = await postJson(MSG_URL, {
                receive_id: USER_ID,
                msg_type: 'file',
                content: JSON.stringify({ file_key: uploadRes.data.file_key })
              }, token);
              console.log('Message:', JSON.stringify(msgRes));
            }
          }

          main().catch(console.error);
          "
